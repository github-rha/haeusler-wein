# About Section
about:
  heading: Häusler Wein
  image:
    src: offenburg-2026.jpeg
    alt: Reblage Auf Offenburg
  paragraphs:
    - |
      2005 pflanzten wir in der Reblage «Auf Offenburg» in Muttenz 7 Aren Zweigelt – eine Rarität im Schweizer Weinbau. Die erste Ernte erfolgte 2007. Später wurde rund ein Drittel der Fläche mit Diolinoir bestockt. Seit Beginn wird der Wein vom Weingut Jauslin gekeltert.
    - |
      2024 hat ein Generationenwechsel stattgefunden: Die junge Generation der Familie Häusler führt den Weinbau mit derselben Leidenschaft und dem Anspruch an Qualität weiter.
    - |
      Folgen Sie unserem Blog <a href="https://blog.haeusler-wein.ch/">Wein Code</a> mit Updates aus dem Rebberg, Vibe Coding, und mehr.

